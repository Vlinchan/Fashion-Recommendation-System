<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fashion Recommender</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #f5efe6;
        --dark: #1c1a17;
        --accent: #c8a96e;
        --muted: #9e9185;
        --card-bg: #faf7f3;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--cream);
        color: var(--dark);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: var(--dark);
        color: white;
        padding: 28px 48px;
      }
      header h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      header p {
        color: var(--accent);
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-top: 4px;
        font-weight: 300;
      }

      .container {
        max-width: 1100px;
        margin: 48px auto;
        padding: 0 24px;
      }

      /* ── Upload ── */
      .upload-box {
        background: white;
        border: 1.5px dashed #c8b9a8;
        border-radius: 20px;
        padding: 48px 40px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .upload-box:hover {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(200, 169, 110, 0.08);
      }
      .upload-box input {
        display: none;
      }
      .upload-box label {
        cursor: pointer;
        display: block;
      }
      .upload-box .icon {
        font-size: 2.6rem;
      }
      .upload-box .label-main {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.25rem;
        margin-top: 14px;
      }
      .upload-box .label-sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 6px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      /* ── Preview ── */
      #preview-section {
        margin-top: 28px;
        text-align: center;
        display: none;
      }
      #preview {
        max-height: 180px;
        border-radius: 14px;
        border: 1.5px solid #e0d5c8;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      }

      #search-btn {
        margin-top: 18px;
        background: var(--dark);
        color: var(--accent);
        border: none;
        padding: 12px 36px;
        border-radius: 50px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
        display: inline-block;
      }
      #search-btn:hover {
        background: #2e2a24;
      }
      #search-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Loading ── */
      #loading {
        text-align: center;
        margin-top: 36px;
        display: none;
        color: var(--muted);
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* ── Results Grid ── */
      #results {
        margin-top: 48px;
      }
      #results-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 28px;
        display: none;
      }
      #results-title span {
        color: var(--accent);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 18px;
      }

      /* ── Card ── */
      .card {
        background: var(--card-bg);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(200, 185, 168, 0.3);
        transition: transform 0.22s, box-shadow 0.22s;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .card-img-wrap {
        background: linear-gradient(160deg, #f0e8dc 0%, #e8ddd2 100%);
        padding: 16px;
        text-align: center;
      }
      .card-img-wrap img {
        width: 100%;
        height: 200px;
        object-fit: contain;
        border-radius: 10px;
      }

      .card-info {
        padding: 10px 14px 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .card-score {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--accent);
      }

      .score-bar-wrap {
        padding: 4px 14px 10px;
      }
      .score-bar-bg {
        height: 3px;
        background: #e0d5c8;
        border-radius: 99px;
        overflow: hidden;
      }
      .score-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #e8c080);
        border-radius: 99px;
      }

      /* ── Try-On Button ── */
      .tryon-btn {
        display: block;
        width: calc(100% - 28px);
        margin: 0 14px 14px;
        padding: 9px;
        background: var(--dark);
        color: var(--accent);
        border: none;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
      }
      .tryon-btn:hover {
        background: #2e2a24;
      }
      .tryon-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .tryon-btn.loading {
        opacity: 0.7;
      }

      /* ── Modal ── */
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(6px);
      }
      #modal-overlay.open {
        display: flex;
      }

      #modal {
        background: var(--card-bg);
        border-radius: 24px;
        padding: 40px;
        max-width: 480px;
        width: 90%;
        text-align: center;
        position: relative;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      }
      #modal h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.6rem;
        margin-bottom: 6px;
      }
      #modal .subtitle {
        font-size: 0.78rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 24px;
      }
      #modal-img {
        width: 100%;
        max-height: 420px;
        object-fit: contain;
        border-radius: 14px;
        border: 1.5px solid #e0d5c8;
        display: none;
      }
      #modal-loading {
        padding: 60px 20px;
        color: var(--muted);
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      #modal-error {
        padding: 20px;
        color: #c0624a;
        font-size: 0.85rem;
        display: none;
      }
      #modal-close {
        position: absolute;
        top: 16px;
        right: 20px;
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        color: var(--muted);
        line-height: 1;
      }
      #modal-close:hover {
        color: var(--dark);
      }

      @media (max-width: 800px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 520px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        header {
          padding: 20px 24px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>✦ Atelier Finder</h1>
      <p>Visual similarity search · Virtual try-on</p>
    </header>

    <div class="container">
      <div class="upload-box">
        <label for="file-input">
          <div class="icon">🪡</div>
          <p class="label-main">Drop a clothing image here</p>
          <p class="label-sub">JPG or PNG · Click to browse</p>
        </label>
        <input type="file" id="file-input" accept="image/*" />
      </div>

      <div id="preview-section">
        <img id="preview" src="" alt="Preview" />
        <br />
        <button id="search-btn">Find Similar Pieces</button>
      </div>

      <div id="loading">⏳ Analysing &amp; matching...</div>

      <div id="results">
        <div id="results-title"></div>
        <div class="grid" id="results-grid"></div>
      </div>
    </div>

    <!-- Try-On Modal -->
    <div id="modal-overlay">
      <div id="modal">
        <button id="modal-close">✕</button>
        <h2>Virtual Try-On</h2>
        <p class="subtitle">Powered by IDM-VTON · Free</p>
        <div id="modal-loading">
          ⏳ Generating try-on...<br /><small
            style="margin-top: 8px; display: block; opacity: 0.7"
            >This takes ~30 seconds</small
          >
        </div>
        <div id="modal-error"></div>
        <img id="modal-img" src="" alt="Try-On Result" />
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("file-input");
      const preview = document.getElementById("preview");
      const previewSec = document.getElementById("preview-section");
      const searchBtn = document.getElementById("search-btn");
      const loading = document.getElementById("loading");
      const grid = document.getElementById("results-grid");
      const resultsTitle = document.getElementById("results-title");

      const modalOverlay = document.getElementById("modal-overlay");
      const modalClose = document.getElementById("modal-close");
      const modalLoading = document.getElementById("modal-loading");
      const modalError = document.getElementById("modal-error");
      const modalImg = document.getElementById("modal-img");

      // ── Upload preview ──
      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;
        preview.src = URL.createObjectURL(file);
        previewSec.style.display = "block";
        grid.innerHTML = "";
        resultsTitle.style.display = "none";
      });

      // ── Recommend ──
      searchBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) return;

        loading.style.display = "block";
        grid.innerHTML = "";
        resultsTitle.style.display = "none";
        searchBtn.disabled = true;

        const formData = new FormData();
        formData.append("image", file);

        try {
          const res = await fetch("/recommend", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();

          resultsTitle.innerHTML = `Top <span>${data.results.length}</span> Recommendations`;
          resultsTitle.style.display = "block";

          data.results.forEach((item, i) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
          <div class="card-img-wrap">
            <img src="data:image/png;base64,${item.image}" alt="Clothing item"/>
          </div>
          <div class="card-info">
            <span class="card-label">Match</span>
            <span class="card-score">${item.score}%</span>
          </div>
          <div class="score-bar-wrap">
            <div class="score-bar-bg">
              <div class="score-bar-fill" style="width:${item.score}%"></div>
            </div>
          </div>
          <button class="tryon-btn" data-path="${item.path}">
            👗 Try On
          </button>
        `;
            grid.appendChild(card);
          });

          // Attach try-on listeners
          document.querySelectorAll(".tryon-btn").forEach((btn) => {
            btn.addEventListener("click", () =>
              openTryOn(btn.dataset.path, btn)
            );
          });
        } catch (e) {
          grid.innerHTML =
            "<p style='color:#a08878;padding:20px'>Something went wrong. Please try again.</p>";
        } finally {
          loading.style.display = "none";
          searchBtn.disabled = false;
        }
      });

      // ── Try-On ──
      async function openTryOn(clothPath, btn) {
        // Open modal in loading state
        modalOverlay.classList.add("open");
        modalLoading.style.display = "block";
        modalImg.style.display = "none";
        modalError.style.display = "none";
        modalError.textContent = "";

        btn.disabled = true;
        btn.textContent = "⏳ Generating...";
        btn.classList.add("loading");

        const formData = new FormData();
        formData.append("cloth_path", clothPath);

        try {
          const res = await fetch("/tryon", { method: "POST", body: formData });
          const data = await res.json();

          if (data.error) throw new Error(data.error);

          modalImg.src = `data:image/png;base64,${data.image}`;
          modalImg.style.display = "block";
          modalLoading.style.display = "none";
        } catch (e) {
          modalLoading.style.display = "none";
          modalError.style.display = "block";
          modalError.textContent = `❌ ${e.message}`;
        } finally {
          btn.disabled = false;
          btn.textContent = "👗 Try On";
          btn.classList.remove("loading");
        }
      }

      // ── Close Modal ──
      modalClose.addEventListener("click", () =>
        modalOverlay.classList.remove("open")
      );
      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove("open");
      });
    </script>
  </body>
</html>
